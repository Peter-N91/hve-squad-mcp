# Cut a GitHub Release + tag for the version in package.json.
#
# Triggers:
#   push to main (package.json / CHANGELOG.md) — the usual path: when a version
#     bump lands on main (e.g. the bump-on-package-release PR merges, or a
#     maintainer bumps package.json), this creates the `v<version>` tag and
#     GitHub Release if that tag does not already exist. Expects a matching
#     CHANGELOG entry for the version.
#   workflow_dispatch — release the current package.json version on demand.
#
# The tag/release is created straight from package.json, so the "release number"
# always tracks this repo's own version (which the bump workflow advances when
# the hve-squad package moves).
name: Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as a draft release (review before publishing)'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'CHANGELOG.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      # ── Read the version from package.json ───────────────────────────────
      - name: Resolve version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not read .version from package.json."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Release version: v$VERSION"

      # ── Guard: skip if the tag already exists (re-run / stale push) ──────
      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | awk '{print $2}' | grep -qx "refs/tags/$TAG"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Extract the matching CHANGELOG section as release notes ──────────
      - name: Extract CHANGELOG entry
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk -v ver="$VERSION" \
            'BEGIN{found=0}
             $0 ~ "^## \\[" ver "\\]" {found=1; next}
             found && /^## \[/{exit}
             found{print}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          printf '%s' "$NOTES" > /tmp/release_notes.md

      # ── Create the GitHub Release (also creates the tag) ─────────────────
      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=(
            "${{ steps.version.outputs.tag }}"
            --title "${{ steps.version.outputs.tag }}"
            --notes-file /tmp/release_notes.md
            --target "${{ github.sha }}"
          )
          [ "${{ inputs.draft }}" = "true" ] && ARGS+=(--draft)
          gh release create "${ARGS[@]}"
          echo "::notice::Created release ${{ steps.version.outputs.tag }}"
