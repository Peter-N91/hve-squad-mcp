# Deploy hve-squad MCP to Azure Container Apps — REFERENCE TEMPLATE (not an active workflow here)
#
# Scope
#   Documentation-only reference workflow. It does NOT run from this repo (the
#   `.workflow.yml` suffix keeps it out of `.github/workflows/`). To activate it,
#   copy to your consumer repo's `.github/workflows/deploy-aca.yml`, replace every
#   <PLACEHOLDER>, review, and commit.
#
# Identity
#   Authenticates with Entra workload-identity federation via azure/login@v2 (OIDC)
#   — no stored client secret. Populate AZURE_CLIENT_ID / AZURE_TENANT_ID /
#   AZURE_SUBSCRIPTION_ID with the azure-scaffold Setup-AzureOidc script (see
#   host/oidc/README.md). The image is built in ACR (no local Docker needed) and
#   the Container App is deployed from host/infra/main.bicep.

name: Deploy hve-squad MCP (ACA)

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: "Container image tag to build and deploy"
        required: true
        default: "latest"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aca-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: "<RESOURCE_GROUP>"
  ACR_NAME: "<REGISTRY>" # ACR name without .azurecr.io
  IMAGE_REPOSITORY: "hve-squad-mcp"

jobs:
  deploy:
    name: Build image + deploy ACA
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build + push in ACR (real, small spend begins here: ACR tasks + image storage).
      - name: Build image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_REPOSITORY:${{ github.event.inputs.imageTag }}" \
            --file squad-mcp/host/Containerfile \
            squad-mcp

      # Deploy the Container App (real spend: ACA env, Log Analytics, Key Vault;
      # idle compute ≈ $0 thanks to scale-to-zero).
      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file squad-mcp/host/infra/main.bicep \
            --parameters squad-mcp/host/infra/main.bicepparam \
            --parameters containerImage="$ACR_NAME.azurecr.io/$IMAGE_REPOSITORY:${{ github.event.inputs.imageTag }}" \
            --parameters containerRegistryServer="$ACR_NAME.azurecr.io"
